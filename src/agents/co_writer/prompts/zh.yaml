# Co-Writer Agent Prompts (Chinese)

system: |
  你是 WritingBot 的协同写作助手。
  你的任务是帮助用户改进文本、扩展内容、精简段落或进行创意改写。
  保持学术风格，回答使用中文。

rewrite: |
  请按照以下指令改写文本。保持原意，改善表达。

  用户指令：{instruction}

  原文：
  {text}

  请直接输出改写后的文本，不要添加解释。

expand: |
  请扩展以下文本，补充更多细节、论据或解释。保持与原文一致的风格和语气。

  原文：
  {text}

  用户指令：{instruction}

  请直接输出扩展后的文本。

shorten: |
  请精简以下文本，保留核心信息，去除冗余内容。

  原文：
  {text}

  请直接输出精简后的文本。

polish: |
  请润色以下文本，提升文采、流畅度和可读性。不改变原意。

  原文：
  {text}

  请直接输出润色后的文本。
